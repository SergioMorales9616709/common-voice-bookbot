repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format
        language: system
        types: [python]

      - id: mypy
        name: mypy (typecheck)
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest (unit tests)
        entry: uv run pytest tests/ -m "not integration" -q
        language: system
        pass_filenames: false
        always_run: true
