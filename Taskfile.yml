version: '3'

tasks:
  sync:
    desc: Install project dependencies
    cmds:
      - uv sync

  analizar:
    desc: Show top female speakers from MLS Spanish (ranked by minutes)
    cmds:
      - uv run analizar_mls.py

  probar:
    desc: "Download N sample clips from a speaker to ./preview/<id>/ — usage: task probar SPEAKER=<id> [N=5]"
    requires:
      vars: [SPEAKER]
    vars:
      N: '{{.N | default "5"}}'
    cmds:
      - uv run probar_speaker.py --speaker {{.SPEAKER}} --n {{.N}}

  exportar:
    desc: "Export a speaker's clips as a LJSpeech dataset — usage: task exportar SPEAKER=<id>"
    requires:
      vars: [SPEAKER]
    cmds:
      - uv run exportar_dataset.py --speaker {{.SPEAKER}}

  exportar-custom:
    desc: "Export with custom output dir — usage: task exportar-custom SPEAKER=<id> OUTPUT=./my/path"
    requires:
      vars: [SPEAKER, OUTPUT]
    cmds:
      - uv run exportar_dataset.py --speaker {{.SPEAKER}} --output {{.OUTPUT}}

  test:
    desc: Run unit tests (no network required)
    cmds:
      - uv run pytest tests/ -v -m "not integration"

  test-integration:
    desc: Run integration tests — requires internet and HF_TOKEN in .env
    cmds:
      - uv run pytest tests/ -v -m integration

  clean:
    desc: Remove generated dataset directory (./data/)
    prompt: This will delete ./data/ — are you sure?
    cmds:
      - cmd: powershell -Command "Remove-Item -Recurse -Force data -ErrorAction SilentlyContinue"
        platforms: [windows]
      - cmd: rm -rf data/
        platforms: [linux, darwin]
